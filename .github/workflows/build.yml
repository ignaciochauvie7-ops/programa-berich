name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run build

      # Opcional: secret VERCEL_DEPLOY_HOOK (Vercel → Settings → Git → Deploy Hooks)
      - name: Trigger Vercel production deploy
        if: github.ref == 'refs/heads/main'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK no configurado; redeploy manual en Vercel si hace falta."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
